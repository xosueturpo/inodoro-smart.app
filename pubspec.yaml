name: inodoro_inteligente
description: Inodoro Smart — app Flutter para control IoT por BLE, LAN, voz y modo demo.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  flutter_blue_plus: ^1.35.3
  http: ^1.2.2
  multicast_dns: ^0.3.2+7
  shared_preferences: ^2.3.3
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.0
  flutter_animate: ^4.5.2
  wifi_scan: ^0.4.1+2
  google_fonts: ^6.2.1
  speech_to_text: ^7.4.0
  google_generative_ai: ^0.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
